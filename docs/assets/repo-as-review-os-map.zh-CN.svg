<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">GitLearnOS 中文概览</title>
  <desc id="desc">老师、课堂、自学、教材、题库和AI输入到一个主Agent；Agent自动整理、针对性出题并自动写回学习者拥有的仓库，同时兼顾在校、自学和多样化学习需求。</desc>
  <defs>
    <style>
      text { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 17px; fill: #506078; }
      .label { font-size: 18px; font-weight: 650; }
      .small { font-size: 14px; fill: #506078; }
      .input { fill: #f4f7fb; stroke: #b7c4d6; stroke-width: 1.5; }
      .core { fill: #eef5ff; stroke: #3976d3; stroke-width: 2; }
      .cap { fill: #ffffff; stroke: #75a1df; stroke-width: 1.5; }
      .repo { fill: #effaf5; stroke: #25966a; stroke-width: 2; }
      .track { fill: #fff8e9; stroke: #d49a2a; stroke-width: 1.5; }
      .arrow { stroke: #70839d; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#70839d"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="24" fill="#ffffff"/>
  <text x="600" y="52" text-anchor="middle" class="title">GitLearnOS · 用户拥有的学习控制层</text>
  <text x="600" y="82" text-anchor="middle" class="subtitle">学习发生在任何地方，一个主 Agent 自动整理、针对性出题、持续写回</text>

  <g>
    <rect x="50" y="112" width="160" height="62" rx="12" class="input"/>
    <rect x="238" y="112" width="160" height="62" rx="12" class="input"/>
    <rect x="426" y="112" width="160" height="62" rx="12" class="input"/>
    <rect x="614" y="112" width="160" height="62" rx="12" class="input"/>
    <rect x="802" y="112" width="160" height="62" rx="12" class="input"/>
    <rect x="990" y="112" width="160" height="62" rx="12" class="input"/>
    <text x="130" y="150" text-anchor="middle" class="label">老师与课堂</text>
    <text x="318" y="150" text-anchor="middle" class="label">补习与同学</text>
    <text x="506" y="150" text-anchor="middle" class="label">纸笔与教材</text>
    <text x="694" y="150" text-anchor="middle" class="label">题库与考试</text>
    <text x="882" y="150" text-anchor="middle" class="label">自主学习</text>
    <text x="1070" y="150" text-anchor="middle" class="label">AI 与工具</text>
  </g>

  <path d="M130 174 L420 222" class="arrow"/>
  <path d="M318 174 L465 222" class="arrow"/>
  <path d="M506 174 L535 222" class="arrow"/>
  <path d="M694 174 L665 222" class="arrow"/>
  <path d="M882 174 L735 222" class="arrow"/>
  <path d="M1070 174 L780 222" class="arrow"/>

  <rect x="260" y="220" width="680" height="190" rx="18" class="core"/>
  <text x="600" y="255" text-anchor="middle" class="label">一个可替换的主 AI Agent</text>
  <text x="600" y="280" text-anchor="middle" class="small">按目标、轨道、需求、时间与用户政策选择最小工作流</text>
  <rect x="300" y="305" width="180" height="76" rx="12" class="cap"/>
  <rect x="510" y="305" width="180" height="76" rx="12" class="cap"/>
  <rect x="720" y="305" width="180" height="76" rx="12" class="cap"/>
  <text x="390" y="336" text-anchor="middle" class="label">自动整理</text>
  <text x="390" y="360" text-anchor="middle" class="small">捕获 · 关联 · 去重</text>
  <text x="600" y="336" text-anchor="middle" class="label">针对性出题</text>
  <text x="600" y="360" text-anchor="middle" class="small">诊断 · 迁移 · 交接</text>
  <text x="810" y="336" text-anchor="middle" class="label">自动执行</text>
  <text x="810" y="360" text-anchor="middle" class="small">写回 · 调度 · 回执</text>

  <path d="M600 410 L600 452" class="arrow"/>
  <rect x="210" y="452" width="780" height="102" rx="18" class="repo"/>
  <text x="600" y="485" text-anchor="middle" class="label">学习者自己的 GitHub 仓库</text>
  <text x="600" y="512" text-anchor="middle" class="small">learning-policy · goals · sources · models · gaps · handoffs · reviews · dashboard</text>
  <text x="600" y="536" text-anchor="middle" class="small">可检查 · 可迁移 · 可纠正 · 可撤销 · Agent 可替换</text>

  <rect x="68" y="575" width="310" height="46" rx="12" class="track"/>
  <rect x="445" y="575" width="310" height="46" rx="12" class="track"/>
  <rect x="822" y="575" width="310" height="46" rx="12" class="track"/>
  <text x="223" y="604" text-anchor="middle" class="label">在校：课程 · 作业 · 考试</text>
  <text x="600" y="604" text-anchor="middle" class="label">自学：兴趣 · 补弱 · 项目</text>
  <text x="977" y="604" text-anchor="middle" class="label">多样需求：研究 · 技能 · 阅读</text>
</svg>
