<svg width="1440" height="760" viewBox="0 0 1440 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Repo as Review OS 中文概览图</title>
  <desc id="desc">展示 Repo as Review OS 的模板仓库、AI 工具和用户目标学习仓库之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#101A36"/>
      <stop offset="1" stop-color="#152B4F"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .title { font: 800 58px -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 25px -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; fill: #BFD3F7; }
      .label { font: 800 28px -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; fill: #F8FAFC; }
      .small { font: 500 20px -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; fill: #D8E4FF; }
      .tiny { font: 500 17px -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; fill: #AFC2E8; }
      .chip { font: 700 16px -apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; fill: #0B1020; }
      .arrow { stroke: #AFC2E8; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1440" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="118" cy="100" r="180" fill="#2563EB" opacity="0.18"/>
  <circle cx="1310" cy="650" r="230" fill="#22D3EE" opacity="0.12"/>
  <circle cx="1110" cy="120" r="130" fill="#A3E635" opacity="0.10"/>

  <text x="92" y="96" class="title">Repo as Review OS</text>
  <text x="96" y="140" class="subtitle">把 GitHub 变成 AI 可以读取、维护、继续接手的学习时间线。</text>

  <g filter="url(#shadow)">
    <rect x="86" y="220" width="350" height="300" rx="30" fill="#111C36" stroke="#335486" stroke-width="2"/>
    <rect x="114" y="248" width="146" height="32" rx="16" fill="url(#blue)"/>
    <text x="147" y="270" class="chip">模板仓</text>
    <text x="116" y="325" class="label">这个仓库</text>
    <text x="116" y="366" class="small">方法 · 文档 · skill</text>
    <text x="116" y="398" class="small">示例 · 规则</text>
    <text x="116" y="454" class="tiny">作为地图读取。</text>
    <text x="116" y="482" class="tiny">不要把个人学习数据写在这里。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="545" y="220" width="350" height="300" rx="30" fill="#111C36" stroke="#3F628F" stroke-width="2"/>
    <rect x="573" y="248" width="112" height="32" rx="16" fill="url(#orange)"/>
    <text x="599" y="270" class="chip">AI 工具</text>
    <text x="575" y="325" class="label">任何有能力的 AI</text>
    <text x="575" y="366" class="small">识别运行环境</text>
    <text x="575" y="398" class="small">确认权限边界</text>
    <text x="575" y="430" class="small">写入结构化记录</text>
    <text x="575" y="486" class="tiny">看能力，不绑定品牌。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1004" y="220" width="350" height="300" rx="30" fill="#111C36" stroke="#4F7B62" stroke-width="2"/>
    <rect x="1032" y="248" width="122" height="32" rx="16" fill="url(#green)"/>
    <text x="1061" y="270" class="chip">目标仓</text>
    <text x="1034" y="325" class="label">你的学习仓库</text>
    <text x="1034" y="366" class="small">目标 · 来源 · 模型</text>
    <text x="1034" y="398" class="small">复习 · dashboard</text>
    <text x="1034" y="454" class="tiny">学习状态写在这里。</text>
    <text x="1034" y="482" class="tiny">原始大文件可留在外面。</text>
  </g>

  <path class="arrow" d="M452 370H516"/>
  <path class="arrow" d="M502 354L520 370L502 386"/>
  <path class="arrow" d="M912 370H976"/>
  <path class="arrow" d="M962 354L980 370L962 386"/>

  <g transform="translate(120 590)">
    <rect x="0" y="0" width="1200" height="76" rx="24" fill="#0B1328" stroke="#263E68" stroke-width="2"/>
    <text x="36" y="47" class="small">核心流程：</text>
    <text x="160" y="47" class="small">目标 → 来源 → 拆解 → 模型 → 题单 → 间隔复习 → 控制台 → 下次复习</text>
  </g>
</svg>
